<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner QR Sincronizado - MMOV2</title>
    
    <meta name="theme-color" content="#0d6efd">
    
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 24px;
        }

        .status {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 500;
            color: #495057;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        #reader {
            width: 100%;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            min-height: 250px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #0d6efd;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0b5ed7;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #bb2d3b;
        }

        .result {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #0d6efd;
        }

        .result.hidden {
            display: none;
        }

        .result h3 {
            margin-bottom: 12px;
            color: #2c3e50;
        }

        .result p {
            margin: 8px 0;
            font-size: 15px;
            word-break: break-word;
        }

        .count {
            font-size: 24px;
            font-weight: bold;
            color: #0d6efd;
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #004085;
        }

        .debug-info {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 12px;
            margin-top: 16px;
            font-size: 12px;
            color: #856404;
            display: none;
        }

        .debug-info.show {
            display: block;
        }

        .camera-select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📷 Escáner QR MMOV2</h1>
        
        <div class="info-box">
            <strong>ℹ️ Nota:</strong> Asegúrate de permitir el acceso a la cámara cuando el navegador lo solicite.
        </div>
        
        <div id="status" class="status">Pulsa "Iniciar cámara" para comenzar</div>
        
        <select id="cameraSelect" class="camera-select" style="display: none;">
            <option value="">Selecciona una cámara</option>
        </select>
        
        <div id="reader"></div>
        
        <div class="buttons">
            <button id="btnStart" class="btn btn-primary">📸 Iniciar cámara</button>
            <button id="btnStop" class="btn btn-danger" disabled>⏹ Detener</button>
        </div>
        
        <div id="result" class="result hidden">
            <h3>Último escaneo</h3>
            <p><strong>Contenido:</strong> <span id="qrContent">-</span></p>
            <p><strong>Veces escaneado:</strong> <span id="qrCount" class="count">0</span></p>
            <p><strong>Última vez:</strong> <span id="qrDate">-</span></p>
        </div>
        
        <div id="debugInfo" class="debug-info">
            <strong>🔧 Información de depuración:</strong><br>
            <span id="debugText"></span>
        </div>
    </div>

    <script type="module">
        // ============================================
        // CONFIGURACIÓN FIREBASE
        // ============================================
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, runTransaction, onSnapshot } 
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDLq-28-UdAJSqMJOFh5Xsj6UvPZ3HNA4w",
            authDomain: "gestionreducciones.firebaseapp.com",
            databaseURL: "https://gestionreducciones-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "gestionreducciones",
            storageBucket: "gestionreducciones.firebasestorage.app",
            messagingSenderId: "1057236051663",
            appId: "1:1057236051663:web:10550d6a7851d8766fb9ba",
            measurementId: "G-HND827Z5CW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const COLLECTION_NAME = "MMOV2_qr_codes";

        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let html5QrcodeScanner = null;
        let currentDocId = null;
        let unsubscribe = null;
        let availableCameras = [];

        // ============================================
        // ELEMENTOS DEL DOM
        // ============================================
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const statusEl = document.getElementById('status');
        const resultEl = document.getElementById('result');
        const qrContentEl = document.getElementById('qrContent');
        const qrCountEl = document.getElementById('qrCount');
        const qrDateEl = document.getElementById('qrDate');
        const cameraSelect = document.getElementById('cameraSelect');
        const debugInfo = document.getElementById('debugInfo');
        const debugText = document.getElementById('debugText');

        // ============================================
        // FUNCIONES DE DIAGNÓSTICO
        // ============================================
        function showDebug(message) {
            debugText.innerHTML += message + '<br>';
            debugInfo.classList.add('show');
            console.log(message);
        }

        function setStatus(message, type = 'normal') {
            statusEl.textContent = message;
            statusEl.className = 'status';
            if (type === 'error') statusEl.classList.add('error');
            if (type === 'success') statusEl.classList.add('success');
        }

        // ============================================
        // VERIFICAR COMPATIBILIDAD
        // ============================================
        async function checkCompatibility() {
            showDebug('🔍 Verificando compatibilidad del navegador...');
            
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error('Tu navegador no soporta acceso a la cámara. Usa Chrome, Firefox o Safari actualizado.');
            }
            
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                throw new Error('La cámara requiere HTTPS. Asegúrate de que la URL empieza con https://');
            }
            
            showDebug('✅ Navegador compatible');
            showDebug('📍 Protocolo: ' + location.protocol);
            showDebug('🌐 Host: ' + location.hostname);
        }

        // ============================================
        // LISTAR CÁMARAS DISPONIBLES
        // ============================================
        async function listCameras() {
            try {
                showDebug('📷 Buscando cámaras disponibles...');
                
                const devices = await navigator.mediaDevices.enumerateDevices();
                availableCameras = devices.filter(device => device.kind === 'videoinput');
                
                showDebug(`✅ Encontradas ${availableCameras.length} cámara(s)`);
                
                if (availableCameras.length === 0) {
                    throw new Error('No se encontraron cámaras en este dispositivo');
                }
                
                // Mostrar selector si hay múltiples cámaras
                if (availableCameras.length > 1) {
                    cameraSelect.innerHTML = '<option value="">Selecciona una cámara</option>';
                    availableCameras.forEach((camera, index) => {
                        const label = camera.label || `Cámara ${index + 1}`;
                        const option = document.createElement('option');
                        option.value = camera.deviceId;
                        option.textContent = label;
                        cameraSelect.appendChild(option);
                    });
                    cameraSelect.style.display = 'block';
                }
                
                return availableCameras;
            } catch (error) {
                showDebug('❌ Error al listar cámaras: ' + error.message);
                throw error;
            }
        }

        // ============================================
        // SOLICITAR PERMISOS
        // ============================================
        async function requestCameraPermission() {
            try {
                showDebug('🔐 Solicitando permisos de cámara...');
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'environment' 
                    } 
                });
                
                showDebug('✅ Permisos concedidos');
                
                // Detener el stream temporal
                stream.getTracks().forEach(track => track.stop());
                
                return true;
            } catch (error) {
                showDebug('❌ Error al solicitar permisos: ' + error.name + ' - ' + error.message);
                
                if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                    throw new Error('Permiso de cámara denegado. Por favor, permite el acceso a la cámara en la configuración del navegador.');
                } else if (error.name === 'NotFoundError') {
                    throw new Error('No se encontró ninguna cámara en este dispositivo.');
                } else if (error.name === 'NotReadableError') {
                    throw new Error('La cámara está siendo usada por otra aplicación. Cierra otras apps que puedan estar usándola.');
                }
                
                throw error;
            }
        }

        // ============================================
        // INICIALIZAR ESCÁNER
        // ============================================
        function initScanner(cameraId = null) {
            html5QrcodeScanner = new Html5Qrcode(
                "reader",
                {
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.QR_CODE,
                        Html5QrcodeSupportedFormats.DATA_MATRIX,
                        Html5QrcodeSupportedFormats.AZTEC
                    ],
                    verbose: false
                }
            );
        }

        // ============================================
        // ESCUCHAR CAMBIOS EN TIEMPO REAL
        // ============================================
        function listenToDocument(docId) {
            if (unsubscribe) unsubscribe();
            
            const docRef = doc(db, COLLECTION_NAME, docId);
            unsubscribe = onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    qrCountEl.textContent = data.veces_escaneado || 0;
                    if (data.ultima_vez) {
                        const fecha = data.ultima_vez.toDate();
                        qrDateEl.textContent = fecha.toLocaleString('es-ES');
                    }
                }
            });
        }

        // ============================================
        // INCREMENTAR CONTADOR
        // ============================================
        async function incrementCounter(decodedText) {
            const docRef = doc(db, COLLECTION_NAME, decodedText);
            
            try {
                const nuevoContador = await runTransaction(db, async (transaction) => {
                    const snapshot = await transaction.get(docRef);
                    let contadorActual = 0;
                    
                    if (snapshot.exists()) {
                        contadorActual = snapshot.data().veces_escaneado || 0;
                    }
                    
                    const nuevoValor = contadorActual + 1;
                    transaction.set(docRef, {
                        veces_escaneado: nuevoValor,
                        ultima_vez: new Date(),
                        contenido: decodedText,
                        app: "MMOV2"
                    });
                    return nuevoValor;
                });
                
                return nuevoContador;
            } catch (error) {
                console.error("Error en la transacción:", error);
                setStatus("❌ Error al guardar: " + error.message, 'error');
                throw error;
            }
        }

        // ============================================
        // CALLBACK CUANDO SE DETECTA UN QR
        // ============================================
        async function onScanSuccess(decodedText, decodedResult) {
            qrContentEl.textContent = decodedText;
            resultEl.classList.remove('hidden');
            setStatus("✅ QR detectado. Actualizando contador...", 'success');
            
            try {
                await incrementCounter(decodedText);
                setStatus("✅ ¡Contador actualizado!", 'success');
                
                currentDocId = decodedText;
                listenToDocument(decodedText);
                
                // Pausar brevemente
                html5QrcodeScanner.pause();
                setTimeout(() => {
                    if (html5QrcodeScanner) {
                        html5QrcodeScanner.resume();
                    }
                }, 2000);
                
            } catch (error) {
                setStatus("❌ Error al actualizar", 'error');
            }
        }

        // ============================================
        // INICIAR ESCÁNER
        // ============================================
        async function startScanner() {
            try {
                // Limpiar debug
                debugText.innerHTML = '';
                
                // Verificar compatibilidad
                await checkCompatibility();
                
                // Solicitar permisos primero
                await requestCameraPermission();
                
                // Listar cámaras
                await listCameras();
                
                // Inicializar escáner
                initScanner();
                
                setStatus("🔄 Iniciando cámara...");
                
                // Configuración para móviles
                const config = {
                    fps: 10,
                    qrbox: { width: 250, height: 250 },
                    aspectRatio: 1.0,
                    disableFlip: false
                };
                
                // Determinar qué cámara usar
                let cameraConfig;
                const selectedCameraId = cameraSelect.value;
                
                if (selectedCameraId) {
                    cameraConfig = { deviceId: { exact: selectedCameraId } };
                    showDebug('📷 Usando cámara seleccionada: ' + selectedCameraId);
                } else {
                    cameraConfig = { facingMode: { exact: 'environment' } };
                    showDebug('📷 Usando cámara trasera por defecto');
                }
                
                // Iniciar escaneo
                await html5QrcodeScanner.start(
                    cameraConfig,
                    config,
                    onScanSuccess,
                    (errorMessage) => {
                        // Errores de escaneo (se ignoran)
                    }
                );
                
                btnStart.disabled = true;
                btnStop.disabled = false;
                setStatus("📷 Apunta la cámara a un código QR", 'success');
                
            } catch (error) {
                console.error('Error al iniciar cámara:', error);
                setStatus("❌ " + error.message, 'error');
                showDebug('❌ Error completo: ' + error.stack);
            }
        }

        // ============================================
        // EVENTOS DE LOS BOTONES
        // ============================================
        btnStart.addEventListener('click', startScanner);

        btnStop.addEventListener('click', () => {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    html5QrcodeScanner.clear();
                    btnStart.disabled = false;
                    btnStop.disabled = true;
                    setStatus("⏹ Cámara detenida");
                    if (unsubscribe) {
                        unsubscribe();
                        unsubscribe = null;
                    }
                }).catch(err => {
                    console.error(err);
                    setStatus("❌ Error al detener: " + err.message, 'error');
                });
            }
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        console.log("App MMOV2 QR Scanner inicializada");
        console.log("Usando colección:", COLLECTION_NAME);
    </script>
</body>
</html>
